name: Full Build

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, opened, synchronize]
  workflow_dispatch:
    inputs:
      stage:
        description: '构建阶段'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - '1'
          - '2'
          - '3'
          - '4'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: imx-forge:ci
  BUILD_OUTPUT: out/release-latest

jobs:
  # 检查是否应该运行
  check:
    name: Check Trigger
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event.label.name }}" == "full-build" ]] || \
               echo "${{ github.event.pull_request.labels.*.name }}" | grep -q "full-build"; then
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  # Stage 1: U-Boot
  stage1:
    name: Stage 1 - U-Boot
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 构建 U-Boot (Stage 1)
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            ${{ env.DOCKER_IMAGE }} \
            bash -c "./scripts/release-all.sh --stage 1"

      - name: 验证产物
        run: |
          [ -f ${{ env.BUILD_OUTPUT }}/uboot/u-boot-dtb.imx ] || exit 1
          ls -lh ${{ env.BUILD_OUTPUT }}/uboot/

  # Stage 2: 双内核并行构建
  stage2-imx:
    name: Stage 2 - Linux (NXP BSP)
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 构建 Linux NXP BSP (Stage 2)
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            ${{ env.DOCKER_IMAGE }} \
            bash -c "./scripts/release-all.sh --stage 2"

      - name: 验证产物
        run: |
          [ -f ${{ env.BUILD_OUTPUT }}/linux/arch/arm/boot/zImage ] || exit 1
          [ -f ${{ env.BUILD_OUTPUT }}/linux/arch/arm/boot/dts/nxp/imx/imx6ull-aes.dtb ] || exit 1

  stage2-mainline:
    name: Stage 2 - Linux (Mainline)
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 应用 Linux Mainline 补丁
        run: |
          if [ -f "patches/linux_mainline/linux_mainline-feat-imx6ull_patches-20260322.patch" ]; then
            cd third_party/linux_mainline
            git apply --3way ../../patches/linux_mainline/linux_mainline-feat-imx6ull_patches-20260322.patch || true
            cd ../..
          fi

      - name: 构建 Linux Mainline
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            ${{ env.DOCKER_IMAGE }} \
            bash -c "./scripts/build_helper/build-mainline-linux.sh"

      - name: 验证产物
        run: |
          [ -f out/mainline/linux/arch/arm/boot/zImage ] || exit 1

  # Stage 3: BusyBox
  stage3:
    name: Stage 3 - BusyBox
    runs-on: ubuntu-latest
    needs: [check, stage2-imx]
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 构建 BusyBox (Stage 3)
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            ${{ env.DOCKER_IMAGE }} \
            bash -c "./scripts/release-all.sh --stage 3"

      - name: 验证产物
        run: |
          [ -f ${{ env.BUILD_OUTPUT }}/busybox/busybox ] || exit 1
          [ -f ${{ env.BUILD_OUTPUT }}/rootfs/bin/busybox ] || exit 1

  # Stage 4: RootFS
  stage4:
    name: Stage 4 - RootFS
    runs-on: ubuntu-latest
    needs: [check, stage3]
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 构建 Docker 镜像
        run: cd docker && docker build -t ${{ env.DOCKER_IMAGE }} .

      - name: 完成 RootFS (Stage 4)
        run: |
          docker run --rm --user root \
            -v $PWD:/workspace \
            -w /workspace \
            ${{ env.DOCKER_IMAGE }} \
            bash -c "./scripts/release-all.sh --stage 4"

      - name: 验证 RootFS
        run: |
          ./scripts/varified_rootfs_ok.sh --rootfs-dir=${{ env.BUILD_OUTPUT }}/rootfs

  # 最终验证和产物上传
  final:
    name: Final Validation
    runs-on: ubuntu-latest
    needs: [check, stage1, stage2-imx, stage2-mainline, stage3, stage4]
    if: needs.check.outputs.should_run == 'true'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: 创建构建摘要
        run: |
          echo "## IMX-Forge 构建报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **U-Boot**: 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "- **Linux NXP BSP**: 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "- **Linux Mainline**: 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "- **BusyBox**: 构建成功" >> $GITHUB_STEP_SUMMARY
          echo "- **RootFS**: 验证通过" >> $GITHUB_STEP_SUMMARY

      - name: 上传 Release 产物
        uses: actions/upload-artifact@v4
        with:
          name: release-images
          path: out/release-latest/images/
          retention-days: 30
