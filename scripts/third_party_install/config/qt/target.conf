# ==============================================================================
# target.conf - Target Qt 交叉编译配置
# ==============================================================================
# 此文件定义 Target Qt（目标平台版本）的安装路径和编译参数
# 使用 Qt 官方推荐的 ./configure 方式编译

# ------------------------------------------------------------------------------
# 依赖检查
# ------------------------------------------------------------------------------
# 此文件依赖 qt.conf 中的 WORK_DIR 变量
: "${WORK_DIR:?Error: WORK_DIR is not set. Please source qt.conf first: source config/qt.conf}"

# ------------------------------------------------------------------------------
# 安装路径
# ------------------------------------------------------------------------------
# Target Qt 的本地安装目录（staging 目录）
# Qt 将安装到这里，然后再部署到目标设备
# 覆盖：输出到项目根目录的 out/qt6-imx6ull/
TARGET_INSTALL_PREFIX="${PROJECT_ROOT}/out/qt6-imx6ull"

# 目标设备上的安装路径
# 这是 Qt 在目标设备上的实际路径，用于运行时查找库和插件
# 通常设置为固定路径，如 /usr/local/qt6 或 /opt/qt6
TARGET_DEVICE_PREFIX="/usr/local/qt6"

# ------------------------------------------------------------------------------
# OpenGL 配置
# ------------------------------------------------------------------------------
# 是否启用 OpenGL 支持
TARGET_USE_OPENGL=false

# OpenGL 类型
#   desktop: 桌面 OpenGL（X11 通常使用）
#   es2:     OpenGL ES 2.0（嵌入式设备通常使用）
# TARGET_OPENGL_TYPE="es2"

# ------------------------------------------------------------------------------
# ALSA 音频支持配置
# ------------------------------------------------------------------------------
# 是否启用 ALSA 音频支持 (QtMultiMedia 需要)
TARGET_USE_ALSA=true

# ALSA mini sysroot 路径 (由 scripts/install_target_deps.sh 自动生成)
# 如果为空，脚本将使用默认路径: ${PROJECT_ROOT}/out/.qt-workdir/arm-sysroot-${TARGET_ARCH}
TARGET_SYSROOT_ALSA=""

# ------------------------------------------------------------------------------
# FFmpeg 多媒体支持配置
# ------------------------------------------------------------------------------
# 是否启用 FFmpeg 多媒体支持 (QtMultiMedia 需要)
TARGET_USE_FFMPEG=true

# FFmpeg 额外配置参数（可选）
# 用于传递额外的 FFmpeg configure 选项
TARGET_FFMPEG_EXTRA_CONFIG=""

# 目标架构 (用于下载正确的 .deb 包)
# 可选值: armhf (ARMv7-A), arm64 (ARMv8-A)
TARGET_ARCH="armhf"

# ------------------------------------------------------------------------------
# 目标平台配置
# ------------------------------------------------------------------------------
# Qt 平台插件名称（可选，configure 通常会自动检测）
# 常用平台:
#   linux-arm-gnueabihf-g++    ARMv7-A, hard float (如 i.MX6ULL)
#   linux-aarch64-gnu-g++       ARMv8-A 64位
QT_TARGET_PLATFORM="linux-arm-gnueabihf-g++"

# 验证关键变量
: "${QT_TARGET_PLATFORM:?Error: QT_TARGET_PLATFORM must be set and non-empty in target.conf}"

# ------------------------------------------------------------------------------
# 渲染后端配置
# ------------------------------------------------------------------------------
# 根据目标平台的显示能力选择合适的渲染后端
# 详见: https://doc.qt.io/qt-6/embedded-linux.html

# 渲染后端配置（精简版）
# 说明：只保留必须显式设置的 flag，删除了默认值已为 OFF 的冗余 flag
# Qt 会自动使用内置版本替代缺失的系统库
TARGET_RENDER_BACKENDS="\
  -DFEATURE_xcb=OFF \
  -DFEATURE_eglfs=OFF \
  -DFEATURE_linuxfb=ON \
  -DFEATURE_evdev=ON \
  -DFEATURE_tslib=ON \
  -DFEATURE_libinput=OFF \
  -DINPUT_opengl=no \
  -DFEATURE_glib=OFF \
  -DFEATURE_system_sqlite=OFF
"

# 渲染后端速查:
#
# +------------------+--------------------------------------------------------+
# | 场景             | 推荐配置                                               |
# +------------------+--------------------------------------------------------+
# | 裸 Framebuffer  | FEATURE_linuxfb=ON, FEATURE_eglfs=OFF, FEATURE_xcb=OFF |
# | EGLFS (GPU直出)  | FEATURE_eglfs=ON, FEATURE_linuxfb=OFF, FEATURE_xcb=OFF |
# | X11 桌面         | FEATURE_xcb=ON, FEATURE_eglfs=OFF                      |
# | Wayland          | FEATURE_wayland=ON + 添加 qtwayland 模块               |
# +------------------+--------------------------------------------------------+
#
# 输入设备:
#   - evdev:    Linux event device 接口（触摸屏、鼠标、键盘）
#   - tslib:   触摸屏校准库（老旧设备，现在多用 libinput）
#   - libinput: 统一输入设备处理（推荐）

# ------------------------------------------------------------------------------
# 额外的 Configure 配置参数
# ------------------------------------------------------------------------------
# 这些参数会原样追加到 ./configure 命令末尾
#
# 注意：
#   1. 使用 - 开关的参数（如 -release）在脚本中自动处理
#   2. 这里主要配置 -D 开头的 CMake 变量和特殊选项
#   3. 详见: https://doc.qt.io/qt-6/configure-options.html
#
TARGET_CONFIGURE_EXTRA="\
  -DFEATURE_printsupport=OFF \
  -no-feature-opengl \
  -DFEATURE_openssl=ON \
  -DFEATURE_ssl=ON \
  -ltcg \
"

# 额外的 CMake 参数（通过 -- 传递给 CMake）
# 用于设置编译器标志等 CMake 特定选项
TARGET_CMAKE_EXTRA="\
  -DCMAKE_CXX_FLAGS=-Wno-psabi \
  -DFEATURE_optimize_full=ON \
"

# 常用参数说明:
#
# 构建类型:
#   -release                  发行版构建（嵌入式设备默认）
#   -debug                    调试版构建
#   -optimize-size            优化体积
#
# 功能开关:
#   -DFEATURE_xxx=ON/OFF      启用/禁用特定功能
#
# 交叉编译特定:
#   -extprefix <path>         本地 staging 安装路径（脚本自动设置）
#   -prefix <path>            目标设备上的路径（脚本自动设置）
#   -qt-host-path <path>      Host Qt 路径（脚本自动设置）
