# ==============================================================================
# toolchain.conf - 交叉编译工具链配置
# ==============================================================================
# 此文件定义交叉编译工具链的下载位置和参数

# ------------------------------------------------------------------------------
# 依赖检查
# ------------------------------------------------------------------------------
# 此文件依赖 qt.conf 中的 WORK_DIR 变量
: "${WORK_DIR:?Error: WORK_DIR is not set. Please source qt.conf first: source config/qt.conf}"

# ------------------------------------------------------------------------------
# 工具链下载
# ------------------------------------------------------------------------------
# 工具链压缩包下载 URL
# 留空则跳过下载，直接使用 TOOLCHAIN_ROOT 指定的本地工具链
#
# 常用 ARM 工具链:
#   - Linaro: https://releases.linaro.org/components/toolchain/binaries/
#   - ARM:    https://developer.arm.com/downloads/-/gnu-rm
#   - NXP:    https://www.nxp.com/design/software/embedded-software/
TOOLCHAIN_URL=""

# ------------------------------------------------------------------------------
# 工具链路径
# ------------------------------------------------------------------------------
# 工具链根目录
#   - TOOLCHAIN_URL 非空时：下载的压缩包解压到此目录（使用 --strip-components=1）
#   - TOOLCHAIN_URL 为空时：直接使用此目录作为工具链路径
TOOLCHAIN_ROOT="/opt/arm-gnu-toolchain/"

# ------------------------------------------------------------------------------
# 工具链前缀
# ------------------------------------------------------------------------------
# 工具链可执行文件的前缀
# 例如: arm-linux-gnueabihf- 则 gcc 为 arm-linux-gnueabihf-gcc
TOOLCHAIN_PREFIX="arm-none-linux-gnueabihf-"

# 验证关键变量
: "${TOOLCHAIN_PREFIX:?Error: TOOLCHAIN_PREFIX must be set and non-empty in toolchain.conf}"

# ------------------------------------------------------------------------------
# 工具链 bin 目录
# ------------------------------------------------------------------------------
# 工具链 bin 目录（包含 gcc/g++/ar/strip 等可执行文件）
# 留空则自动在 TOOLCHAIN_ROOT 下递归查找 {TOOLCHAIN_PREFIX}gcc
TOOLCHAIN_BIN_DIR=""

# ------------------------------------------------------------------------------
# Sysroot 配置
# ------------------------------------------------------------------------------
# Sysroot 路径（可选）
# 留空则不设置 CMAKE_SYSROOT，适用于大多数情况
# 如果工具链本身不包含 sysroot，可指向目标系统的库文件目录
TOOLCHAIN_SYSROOT=""

# ------------------------------------------------------------------------------
# 目标系统信息
# ------------------------------------------------------------------------------
# 对应 CMAKE_SYSTEM_NAME，通常是 "Linux"
TARGET_OS="Linux"

# 对应 CMAKE_SYSTEM_PROCESSOR
# ARMv7: arm, ARMv8: aarch64
TARGET_ARCH="armhf"
