# ==============================================================================
# qt.conf - Qt 版本与源码配置
# ==============================================================================
# 此文件定义 Qt 版本、源码下载地址、模块列表和编译开关

# ------------------------------------------------------------------------------
# Qt 版本配置
# ------------------------------------------------------------------------------
QT_VERSION="6.9.1"

# ------------------------------------------------------------------------------
# Qt 源码下载地址
# ------------------------------------------------------------------------------
# 官方源码下载地址（必填）
# Qt 6.9.1: https://download.qt.io/official_releases/qt/6.9/6.9.1/single/qt-everywhere-src-6.9.1.tar.xz
# 国内镜像（可选）:
#   - USTC: https://mirrors.ustc.edu.cn/qtproject/archive/qt/6.9/6.9.1/single/qt-everywhere-src-6.9.1.tar.xz
#   - 清华: https://mirrors.tuna.tsinghua.edu.cn/qt/official_releases/qt/6.9/6.9.1/single/qt-everywhere-src-6.9.1.tar.xz
QT_SRC_URL="https://download.qt.io/official_releases/qt/6.9/6.9.1/single/qt-everywhere-src-${QT_VERSION}.tar.xz"

# 解压后的源码目录名（通常是 qt-everywhere-src-{version}）
QT_SRC_DIR="qt-everywhere-src-${QT_VERSION}"

# ------------------------------------------------------------------------------
# 工作目录配置
# ------------------------------------------------------------------------------
# 编译工作根目录，所有中间产物和最终安装都在此目录下
# 覆盖：指向 imx-forge 项目根目录（而非 qt-compile-pipeline 目录）
# 注意：这些配置会在 compile-${date} 分支上覆盖到 third_party/qt-compile-pipeline/config/
# qt-compile-pipeline 是 submodule，需要用 --show-superproject-working-tree 获取父项目根目录
PROJECT_ROOT="$(git rev-parse --show-superproject-working-tree)"
# 中间文件工作目录（源码、构建目录等）→ out/.qt-workdir
WORK_DIR="${PROJECT_ROOT}/out/.qt-workdir"

# ------------------------------------------------------------------------------
# Qt 模块配置
# ------------------------------------------------------------------------------
# 空格分隔的模块列表，传递给 ./configure -submodules
# 可用模块详见 Qt 源码目录或: https://doc.qt.io/qt-6/configure-options.html
QT_MODULES="qtbase qtdeclarative qtmultimedia qtcharts qtshadertools qtserialport qtvirtualkeyboard qt5compat"

# 模块说明:
#   qtbase           - 核心模块（必需）
#   qtdeclarative    - QML/Quick 支持
#   qtmultimedia     - 多媒体支持
#   qtcharts         - 图表组件
#   qtshadertools    - 着色器工具
#   qtserialport     - 串口通信
#   qtvirtualkeyboard - 虚拟键盘
#   qt5compat        - Qt 5 兼容层

# ------------------------------------------------------------------------------
# 编译开关
# ------------------------------------------------------------------------------
# 是否编译 Host Qt（主机版本）
BUILD_HOST_QT=true

# 是否编译 Target Qt（交叉编译版本）
# 注意：设为 true 时会强制启用 BUILD_HOST_QT
BUILD_TARGET_QT=true

# ------------------------------------------------------------------------------
# 变量验证（配置文件加载后自动检查）
# ------------------------------------------------------------------------------
# 使用 bash 的 :${VAR:?error} 语法，变量为空时立即报错退出
# 这可以防止因变量为空导致的意外行为（如在根目录创建目录）
: "${QT_VERSION:?Error: QT_VERSION must be set and non-empty in qt.conf}"
: "${QT_SRC_URL:?Error: QT_SRC_URL must be set and non-empty in qt.conf}"
: "${QT_MODULES:?Error: QT_MODULES must be set and non-empty in qt.conf}"
: "${WORK_DIR:?Error: WORK_DIR must be set and non-empty in qt.conf}"
