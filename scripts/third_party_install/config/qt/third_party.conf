# ==============================================================================
# third_party.conf - 第三方库配置
# ==============================================================================
# 此文件定义第三方库（PulseAudio、FFmpeg 等）的获取和编译配置

# ------------------------------------------------------------------------------
# 依赖检查
# ------------------------------------------------------------------------------
# 此文件依赖 qt.conf 中的 WORK_DIR 变量
: "${WORK_DIR:?Error: WORK_DIR is not set. Please source qt.conf first: source config/qt.conf}"

# ------------------------------------------------------------------------------
# 通用配置
# ------------------------------------------------------------------------------
# 第三方库统一 sysroot 目录
THIRD_PARTY_SYSROOT="${WORK_DIR}/third-party-sysroot"

# 临时下载目录
THIRD_PARTY_DL_DIR="${THIRD_PARTY_SYSROOT}/downloads"

# ------------------------------------------------------------------------------
# tslib 配置（触摸屏校准库，Qt 需要 FEATURE_tslib=ON）
# ------------------------------------------------------------------------------
TSLIB_ENABLED="${TSLIB_ENABLED:-true}"

# tslib 源码编译配置
TSLIB_BUILTIN_VERSION="${TSLIB_BUILTIN_VERSION:-1.22}"
TSLIB_BUILTIN_URL="${TSLIB_BUILTIN_URL:-https://github.com/libts/tslib/releases/download/${TSLIB_BUILTIN_VERSION}/tslib-${TSLIB_BUILTIN_VERSION}.tar.xz}"

# ------------------------------------------------------------------------------
# libsndfile 配置（PulseAudio依赖）
# ------------------------------------------------------------------------------
SNDFILE_ENABLED="${SNDFILE_ENABLED:-true}"
SNDFILE_BUILTIN_VERSION="${SNDFILE_BUILTIN_VERSION:-1.2.2}"
SNDFILE_BUILTIN_URL="${SNDFILE_BUILTIN_URL:-https://github.com/libsndfile/libsndfile/releases/download/${SNDFILE_BUILTIN_VERSION}/libsndfile-${SNDFILE_BUILTIN_VERSION}.tar.xz}"

# ------------------------------------------------------------------------------
# PulseAudio 配置
# ------------------------------------------------------------------------------
# 是否启用 PulseAudio（Qt Multimedia FFmpeg backend 在 Linux 上需要）
PULSEAUDIO_ENABLED="${PULSEAUDIO_ENABLED:-true}"

# PulseAudio 源码编译配置
PULSEAUDIO_BUILTIN_VERSION="${PULSEAUDIO_BUILTIN_VERSION:-17.0}"
PULSEAUDIO_BUILTIN_URL="${PULSEAUDIO_BUILTIN_URL:-https://www.freedesktop.org/software/pulseaudio/releases/pulseaudio-${PULSEAUDIO_BUILTIN_VERSION}.tar.xz}"

# ------------------------------------------------------------------------------
# FFmpeg 配置
# ------------------------------------------------------------------------------
# 是否启用 FFmpeg
FFMPEG_ENABLED="${FFMPEG_ENABLED:-true}"

# FFmpeg 源码编译配置
FFMPEG_BUILTIN_VERSION="${FFMPEG_BUILTIN_VERSION:-7.1}"
FFMPEG_BUILTIN_URL="${FFMPEG_BUILTIN_URL:-https://ffmpeg.org/releases/ffmpeg-${FFMPEG_BUILTIN_VERSION}.tar.xz}"

# ------------------------------------------------------------------------------
# OpenSSL 配置
# ------------------------------------------------------------------------------
# 是否启用 OpenSSL（Qt Network HTTPS 支持需要）
OPENSSL_ENABLED="${OPENSSL_ENABLED:-true}"

# OpenSSL 源码编译配置
OPENSSL_BUILTIN_VERSION="${OPENSSL_BUILTIN_VERSION:-3.4.0}"
OPENSSL_BUILTIN_URL="${OPENSSL_BUILTIN_URL:-https://www.openssl.org/source/openssl-${OPENSSL_BUILTIN_VERSION}.tar.gz}"

# OpenSSL 目标架构（对应 OpenSSL 的 Configure 目标）
# 常用值: linux-armv4, linux-aarch64, linux-x86_64
# 留空则自动根据 TOOLCHAIN_PREFIX 检测
OPENSSL_TARGET="${OPENSSL_TARGET:-}"

# ------------------------------------------------------------------------------
# 库注册表
# ------------------------------------------------------------------------------
# 启用的第三方库列表（空格分隔）
# 注意安装顺序：tslib -> libsndfile -> pulseaudio -> ffmpeg -> openssl
THIRD_PARTY_LIBS="${THIRD_PARTY_LIBS:-tslib libsndfile pulseaudio ffmpeg openssl}"

# 为每个库定义配置（运行时生成）
#   THIRD_PARTY_<LIB>_ENABLED  - 是否启用
#   THIRD_PARTY_<LIB>_PATH     - 安装路径
declare -gA THIRD_PARTY_LIB_REGISTRY
